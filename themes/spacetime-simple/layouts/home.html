{{ define "main" }}
{{ .Content }}

<h2>software</h2>

<ul>
{{ range hugo.Data.software }}
<li><a href="{{ .url }}">{{ .name }}</a> : : {{ .description }}</li>
{{ end }}
</ul>

<h2>posts</h2>

<div class="nav">
<a href="/index.xml">subscribe with rss/atom</a>
</div>

{{ partial "post-list.html" . }}

<h2>theses</h2>

{{ range hugo.Data.theses }}
<blockquote>
<p><strong>{{ .title }}</strong> [<a href="{{ .url }}">pdf</a>]</p>
<p>{{ .abstract }}</p>
</blockquote>
{{ end }}

{{ end }}
